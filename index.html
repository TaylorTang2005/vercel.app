<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能仓储进销存系统 v1.2</title>
    <!-- PWA 配置 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" href="logo.png">
    <!-- 引入 Tailwind CSS (样式库) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 底部导航栏安全区适配 iPhone */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- 顶部标题栏 -->
    <header class="bg-blue-600 text-white p-4 shadow-md z-10 flex justify-between items-center">
        <h1 class="text-lg font-bold">智能仓储 v1.2</h1>
        <div id="connection-status" class="text-xs bg-blue-700 px-2 py-1 rounded">正在连接...</div>
    </header>

    <!-- 主要内容区域 (动态切换) -->
    <main id="app-content" class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24">
        <!-- 默认加载仪表盘 -->
        <div id="page-dashboard" class="space-y-4">
            <!-- 统计卡片 -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-gray-500 text-xs">总库存数量</p>
                    <p class="text-2xl font-bold mt-1" id="dash-total-stock">-</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500">
                    <p class="text-gray-500 text-xs">缺货预警</p>
                    <p class="text-2xl font-bold mt-1 text-red-600" id="dash-low-stock">-</p>
                </div>
            </div>

            <!-- 快捷入口 -->
            <div class="grid grid-cols-2 gap-4 mt-6">
                <button onclick="switchTab('inventory')" class="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center active:bg-gray-100">
                    <span class="text-2xl mb-2">📦</span>
                    <span class="font-medium">库存清点</span>
                </button>
                <button onclick="switchTab('inbound')" class="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center active:bg-gray-100">
                    <span class="text-2xl mb-2">🚚</span>
                    <span class="font-medium">入库收银</span>
                </button>
                <button onclick="switchTab('outbound')" class="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center active:bg-gray-100">
                    <span class="text-2xl mb-2">💸</span>
                    <span class="font-medium">出库销售</span>
                </button>
                <button onclick="switchTab('products')" class="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center active:bg-gray-100">
                    <span class="text-2xl mb-2">📝</span>
                    <span class="font-medium">产品管理</span>
                </button>
            </div>
        </div>

        <!-- 1. 产品管理页面 -->
        <div id="page-products" class="hidden space-y-4">
            <h2 class="text-xl font-bold">产品档案管理</h2>
            <div class="flex gap-2">
                <input type="text" id="new-prod-name" placeholder="输入产品名称" class="flex-1 p-3 border rounded-lg">
                <button onclick="addProduct()" class="bg-blue-600 text-white px-4 rounded-lg">新增</button>
            </div>
            <ul id="product-list" class="space-y-2">
                <!-- 列表由 JS 生成 -->
                <li class="text-center text-gray-400 py-10">加载中...</li>
            </ul>
        </div>

        <!-- 2. 库存清点页面 -->
        <div id="page-inventory" class="hidden space-y-4">
            <h2 class="text-xl font-bold">库存实时盘点</h2>
            <div class="bg-white rounded-lg shadow-sm divide-y">
                 <ul id="inventory-list" class="divide-y">
                    <!-- 列表由 JS 生成 -->
                </ul>
            </div>
        </div>

        <!-- 3. 入库/采购页面 -->
        <div id="page-inbound" class="hidden space-y-4">
            <h2 class="text-xl font-bold">进货入库登记</h2>
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-4">
                <div>
                    <label class="block text-sm text-gray-500 mb-1">选择商品</label>
                    <select id="inbound-select" class="w-full p-3 border rounded-lg bg-gray-50"></select>
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">入库数量</label>
                    <input type="number" id="inbound-qty" class="w-full p-3 border rounded-lg" placeholder="0">
                </div>
                <button onclick="handleInbound()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">确认入库</button>
            </div>
        </div>

        <!-- 4. 出库/收银页面 -->
        <div id="page-outbound" class="hidden space-y-4">
            <h2 class="text-xl font-bold">出库销售登记</h2>
             <div class="bg-white p-4 rounded-xl shadow-sm space-y-4">
                <div>
                    <label class="block text-sm text-gray-500 mb-1">选择商品</label>
                    <select id="outbound-select" class="w-full p-3 border rounded-lg bg-gray-50"></select>
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">出库数量</label>
                    <input type="number" id="outbound-qty" class="w-full p-3 border rounded-lg" placeholder="0">
                </div>
                <button onclick="handleOutbound()" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold">确认出库</button>
            </div>
        </div>

        <!-- 5. 采购进展/预警页面 -->
        <div id="page-alerts" class="hidden space-y-4">
            <h2 class="text-xl font-bold">低库存预警 & 采购建议</h2>
            <div id="alert-list" class="space-y-2">
                <!-- JS 生成 -->
            </div>
        </div>

    </main>

    <!-- 底部导航栏 -->
    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full pb-safe z-20">
        <div class="flex justify-around items-center h-16">
            <button onclick="switchTab('dashboard')" class="nav-btn flex flex-col items-center text-blue-600" data-target="dashboard">
                <span class="text-xl">🏠</span>
                <span class="text-xs mt-1">首页</span>
            </button>
            <button onclick="switchTab('inventory')" class="nav-btn flex flex-col items-center text-gray-400" data-target="inventory">
                <span class="text-xl">📦</span>
                <span class="text-xs mt-1">库存</span>
            </button>
            <button onclick="switchTab('alerts')" class="nav-btn flex flex-col items-center text-gray-400" data-target="alerts">
                <span class="text-xl">⚠️</span>
                <span class="text-xs mt-1">预警</span>
            </button>
            <button onclick="switchTab('products')" class="nav-btn flex flex-col items-center text-gray-400" data-target="products">
                <span class="text-xl">⚙️</span>
                <span class="text-xs mt-1">管理</span>
            </button>
        </div>
    </nav>

    <!-- 引入核心逻辑 -->
    <script src="app.js"></script>
</body>
</html>
